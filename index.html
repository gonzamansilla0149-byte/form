<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Mayorista</title>

  <!-- META PIXEL -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;
      n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;
      n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];
      t=b.createElement(e);t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', 'TU_PIXEL_ID');
    fbq('track', 'PageView');
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p.sub {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #25D366;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    .note {
      font-size: 12px;
      color: #777;
      margin-top: 10px;
      text-align: center;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>Acceso a canal mayorista</h1>
  <p class="sub">Completá esto para ingresar al canal exclusivo de revendedores</p>

  <form id="form">

    <label>¿Vendés actualmente?</label>
    <select id="ventas" required>
      <option value="">Seleccionar</option>
      <option>Sí, vendo actualmente</option>
      <option>No, pero quiero empezar</option>
      <option>Solo estoy mirando</option>
    </select>

    <label>¿Cuántas unidades podrías vender por semana?</label>
    <select id="cantidad" required>
      <option value="">Seleccionar</option>
      <option>1-5</option>
      <option>5-20</option>
      <option>20-50</option>
      <option>+50</option>
    </select>

    <button type="submit">Acceder al canal</button>

  </form>

  <p class="note">Acceso inmediato después de completar</p>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  let eventID = Date.now();

  // Evento Lead (optimizado)
  fbq('track', 'Lead', {}, {eventID});

  // Delay mínimo para asegurar tracking
  setTimeout(function(){
    window.location.href = "https://whatsapp.com/channel/0029Vb7XaaX2P59rBpq4bd47";
  }, 500);
});
</script>

</body>
</html>
